<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Stage Music Admin</title><link rel="icon" href="../assets/icons/favicon.svg" type="image/svg+xml"><link rel="stylesheet" href="../css/style.css"></head><body><div class="bg"></div><div class="overlay"></div><div class="app"><header class="hero glass"><div class="brand-box"><img class="logo" src="../assets/branding/logo-stage-music.png" alt="Stage Music"><div><div class="eyebrow">Painel</div><h1>Stage Music Admin</h1><p>Banco online público de cifras e letras</p></div></div><div class="actions"><a class="btn primary" href="../index.html">Voltar ao App</a></div></header><main class="grid admin-grid"><section class="card glass"><div class="section-top"><div><div class="eyebrow">Cadastro</div><h2>Nova música pública</h2></div><div class="pill" id="adminCount">0 músicas</div></div><div class="form-grid"><input id="title" placeholder="Título"><input id="artist" placeholder="Artista"><input id="key" placeholder="Tom"><input id="bpm" type="number" placeholder="BPM"><input id="capo" placeholder="Capotraste"><input id="tags" placeholder="Tags"><input id="notes" class="full" placeholder="Observações"><textarea id="lyrics" class="full" rows="14" placeholder="Cole aqui a cifra do Word..."></textarea></div><div class="actions"><button class="btn primary" id="addMusic">Adicionar</button><button class="btn soft" id="clearForm">Limpar</button><button class="btn soft" id="importJson">Importar JSON</button><button class="btn soft" id="exportJson">Exportar manifesto online</button><input id="jsonFileInput" type="file" accept=".json,application/json" hidden></div></section><section class="card glass"><div class="section-top"><div><div class="eyebrow">Prévia</div><h2>Biblioteca pública</h2></div></div><div id="adminList" class="list"></div></section></main></div><script src="../js/store.js"></script><script src="../js/admin.js"></script></body></html>
