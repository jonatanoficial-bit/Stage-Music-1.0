<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stage Music - Live Music Performance</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
<h1>Stage Music</h1>
<p>Live Music Performance</p>
</header>

<div class="layout">

<div class="panel">
<h2>Biblioteca</h2>
<input id="search" placeholder="Buscar música">
<div id="library"></div>
</div>

<div class="panel">
<h2 id="title">Selecione uma música</h2>

<div class="controls">
<button id="transposeDown">- Tom</button>
<button id="transposeUp">+ Tom</button>
<button id="favorite">★ Favorito</button>
</div>

<pre id="viewer"></pre>

</div>

<div class="panel">
<h2>Setlists</h2>
<button id="saveSetlist">Salvar setlist</button>
<div id="setlists"></div>
</div>

</div>

<script src="js/store.js"></script>
<script src="js/app.js"></script>

</body>
</html>
