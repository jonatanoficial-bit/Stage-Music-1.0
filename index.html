<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stage Music - Live Music Performance</title>
<link rel="icon" href="assets/icons/favicon.svg">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="top">
<h1>Stage Music</h1>
<p>Live Music Performance</p>
</header>

<main class="grid">

<section class="panel">
<h2>Biblioteca</h2>

<input id="search" placeholder="Buscar música">

<div class="upload">
<label>Adicionar PDF local</label>
<input type="file" id="pdfInput" accept="application/pdf">
</div>

<div id="library"></div>

</section>

<section class="panel viewer">

<h2 id="title">Selecione uma música</h2>
<div id="meta"></div>

<div class="controls">
<button id="prev">Anterior</button>
<button id="next">Próxima</button>
<button id="addSetlist">Adicionar ao Setlist</button>
</div>

<div id="viewer"></div>

</section>

<section class="panel setlist">

<h2>Setlist</h2>
<div id="setlist"></div>

</section>

</main>

<script src="js/store.js"></script>
<script src="js/app.js"></script>

</body>
</html>
